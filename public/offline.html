<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>Bazaar offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Jost,
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f8fafc;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #d9dee8;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }

      img {
        width: 56px;
        height: 56px;
        display: block;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.55;
      }

      .translations {
        display: grid;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <div class="translations">
        <section lang="en">
          <h1>You are offline</h1>
          <p>Connect to the internet to continue using Bazaar.</p>
        </section>
        <section lang="ru">
          <h1>Нет подключения</h1>
          <p>Подключитесь к интернету, чтобы продолжить работу в Bazaar.</p>
        </section>
        <section lang="kg">
          <h1>Интернет жок</h1>
          <p>Bazaar менен иштөөнү улантуу үчүн интернетке туташыңыз.</p>
        </section>
      </div>
    </main>
  </body>
</html>
